name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# semantic-release がバンプコミットを push するため、リリースは直列化する
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      # main へ CI を経ず直 push されたコミットも公開前にテストを通す
      - run: uv sync

      - run: uv run pytest

      - uses: python-semantic-release/python-semantic-release@v10
        id: release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.release.outputs.released == 'true'
        run: uv build

      - if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
