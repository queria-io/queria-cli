name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      actions: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: python-semantic-release/python-semantic-release@v9
        id: release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.release.outputs.released == 'true'
        uses: astral-sh/setup-uv@v7

      - if: steps.release.outputs.released == 'true'
        run: uv build

      - if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      # docs.queria.io (queria-io/docs) を再ビルドして /changelog に新リリースを反映する
      - if: steps.release.outputs.released == 'true'
        run: curl -fsS -X POST "$DOCS_DEPLOY_HOOK"
        env:
          DOCS_DEPLOY_HOOK: ${{ secrets.DOCS_DEPLOY_HOOK }}
